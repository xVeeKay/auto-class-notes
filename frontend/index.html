<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#ffffff" />

    <!-- Browser Title -->
    <title>Revly – AI Revision Notes</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Revly transforms lecture images into clean, concise AI-powered revision notes, helping students revise faster and study smarter."
    />

    <meta
      name="keywords"
      content="Revly, AI Notes, Revision Notes, Student Notes, AI Study Assistant, Lecture Notes, OCR Notes, Study Companion, Exam Preparation"
    />

    <meta name="author" content="Vishal Kakiyan" />
    <meta name="application-name" content="Revly" />
    <meta name="apple-mobile-web-app-title" content="Revly" />

    <!-- Open Graph (Discord, WhatsApp, LinkedIn, Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Revly – AI Revision Notes" />
    <meta
      property="og:description"
      content="Turn lecture images into concise revision notes using AI."
    />

    <!-- Replace after deployment -->
    <meta property="og:url" content="https://revly.vercel.app" />

    <!-- Replace with your hosted preview image -->
    <meta property="og:image" content="/logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Revly – AI Revision Notes" />
    <meta
      name="twitter:description"
      content="Study smarter with AI-generated revision notes."
    />
    <meta name="twitter:image" content="/logo.png" />
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
